<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RNG Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', 'Menlo', monospace;
      background: transparent;
      overflow: hidden;
      user-select: none;
      width: 100vw;
      height: 100vh;
    }

    .overlay {
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 20, 0.88);
      border: 1px solid rgba(0, 212, 170, 0.4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: move;
      -webkit-app-region: drag;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .overlay:hover {
      border-color: rgba(0, 212, 170, 0.8);
      box-shadow: 0 0 12px rgba(0, 212, 170, 0.3);
    }

    .overlay.flash {
      border-color: rgba(0, 255, 200, 1);
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.6);
    }

    .number {
      -webkit-app-region: no-drag;
      font-size: 22px;
      font-weight: 800;
      color: #00d4aa;
      text-shadow: 0 0 8px rgba(0, 212, 170, 0.5);
      line-height: 1;
      transition: transform 0.15s, font-size 0.1s;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .number:hover {
      background: rgba(0, 212, 170, 0.1);
    }

    .number:active {
      transform: scale(0.9);
    }

    .number.pop {
      animation: numPop 0.2s ease-out;
    }

    @keyframes numPop {
      0% { transform: scale(0.6); opacity: 0.5; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .close-btn {
      -webkit-app-region: no-drag;
      position: absolute;
      top: 3px;
      right: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255, 95, 87, 0.7);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #fff;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
    }

    .close-btn:hover {
      background: #ff5f57;
    }

    .overlay:hover .close-btn {
      opacity: 1;
    }

    .id-badge {
      position: absolute;
      bottom: 2px;
      left: 5px;
      font-size: 8px;
      color: rgba(0, 212, 170, 0.5);
      font-weight: 600;
    }

    .resize-handle {
      -webkit-app-region: no-drag;
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      cursor: se-resize;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="number" id="number">--</div>
    <div class="close-btn" id="closeBtn">&times;</div>
    <div class="id-badge" id="idBadge">#1</div>
    <div class="resize-handle"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const numberEl = document.getElementById('number');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeBtn');
    const idBadge = document.getElementById('idBadge');

    let overlayId = 0;

    // Receive overlay ID
    ipcRenderer.on('set-overlay-id', (event, id) => {
      overlayId = id;
      idBadge.textContent = '#' + id;
    });

    // Receive RNG updates
    ipcRenderer.on('rng-update', (event, data) => {
      numberEl.textContent = data.number;
      numberEl.classList.remove('pop');
      void numberEl.offsetWidth; // force reflow
      numberEl.classList.add('pop');

      overlay.classList.add('flash');
      setTimeout(() => overlay.classList.remove('flash'), 300);
    });

    // Close this overlay
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      ipcRenderer.send('remove-overlay', overlayId);
    });

    // Click number to roll THIS overlay only
    numberEl.addEventListener('click', (e) => {
      e.stopPropagation();
      ipcRenderer.send('roll-single', overlayId);
    });

    // Auto-scale font size on window resize
    function scaleFont() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const size = Math.max(14, Math.min(64, Math.floor(Math.min(w * 0.45, h * 0.65))));
      numberEl.style.fontSize = size + 'px';
      // Scale id badge too
      idBadge.style.fontSize = Math.max(6, Math.floor(size * 0.3)) + 'px';
    }

    window.addEventListener('resize', scaleFont);
    scaleFont();
  </script>
</body>
</html>
